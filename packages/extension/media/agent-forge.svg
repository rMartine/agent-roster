<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Hammer head — bold rectangle at ~35° angle -->
  <rect x="30" y="18" width="48" height="22" rx="3" transform="rotate(35 54 29)" fill="#6B7B8D"/>
  <!-- Hammer head highlight -->
  <rect x="32" y="20" width="44" height="10" rx="2" transform="rotate(35 54 29)" fill="#7D8D9F" opacity="0.6"/>
  <!-- Hammer handle -->
  <line x1="72" y1="52" x2="105" y2="105" stroke="#6B7B8D" stroke-width="8" stroke-linecap="round"/>
  <!-- Strike point glow -->
  <circle cx="38" cy="58" r="6" fill="#E8772E" opacity="0.3"/>
  <!-- Spark 1 — upper left -->
  <polygon points="28,42 24,38 30,36" fill="#FFB830"/>
  <!-- Spark 2 — left -->
  <polygon points="18,56 14,50 22,50" fill="#FFB830"/>
  <!-- Spark 3 — lower left -->
  <polygon points="24,70 18,68 22,62" fill="#E8772E"/>
  <!-- Spark dot 1 -->
  <circle cx="14" cy="42" r="2.5" fill="#FFB830"/>
  <!-- Spark dot 2 -->
  <circle cx="32" cy="74" r="2" fill="#E8772E"/>
  <!-- Spark dot 3 -->
  <circle cx="10" cy="62" r="1.5" fill="#FFB830" opacity="0.8"/>
</svg>
