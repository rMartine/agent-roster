<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Anvil — matching seed-42 composition: T-shape anvil with flame and spark rays -->

  <!-- Anvil top face (wide) -->
  <rect x="4" y="8" width="16" height="4" rx="0.5" fill="#C5C5C5"/>

  <!-- Anvil horn (left protrusion) -->
  <polygon points="4,9 1,10.5 4,12" fill="#C5C5C5"/>

  <!-- Anvil neck -->
  <rect x="9" y="12" width="6" height="4" fill="#C5C5C5"/>

  <!-- Anvil base (wide) -->
  <rect x="5" y="16" width="14" height="3" rx="0.5" fill="#C5C5C5"/>

  <!-- Flame — rising from top-left of anvil face -->
  <path d="M8,8 Q7,4 9,2 Q8,5 10,4 Q9,6 10,8" fill="#C5C5C5" opacity="0.9"/>

  <!-- Spark ray — left horizontal -->
  <line x1="4" y1="10" x2="0.5" y2="10" stroke="#C5C5C5" stroke-width="1" stroke-linecap="round"/>

  <!-- Spark ray — right horizontal -->
  <line x1="20" y1="10" x2="23.5" y2="10" stroke="#C5C5C5" stroke-width="1" stroke-linecap="round"/>

  <!-- Spark ray — upper-left diagonal -->
  <line x1="5" y1="8" x2="2.5" y2="5.5" stroke="#C5C5C5" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Spark ray — upper-right diagonal -->
  <line x1="19" y1="8" x2="21.5" y2="5.5" stroke="#C5C5C5" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Spark dots -->
  <circle cx="2" cy="7" r="0.8" fill="#C5C5C5"/>
  <circle cx="22" cy="7" r="0.8" fill="#C5C5C5"/>
  <circle cx="1" cy="12" r="0.6" fill="#C5C5C5" opacity="0.7"/>
</svg>
